resolver 8.8.8.8 8.8.4.4 valid=30s;

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and discovery routes to backend
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api {
        proxy_pass ${BACKEND_URL}/api;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
    }

    location /health {
        proxy_pass ${BACKEND_URL}/health;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
    }

    location /.well-known/ {
        proxy_pass ${BACKEND_URL}/.well-known/;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
    }

    location = /llms.txt {
        proxy_pass ${BACKEND_URL}/llms.txt;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
    }

    # Named location for proxying root to backend (used by content negotiation)
    location @backend_root {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Forwarded-Proto https;
    }

    # Root URL: agents get JSON discovery, browsers get the SPA
    location = / {
        error_page 418 = @backend_root;
        if ($http_accept ~* "application/json") {
            return 418;
        }
        try_files $uri /index.html;
        add_header X-API-Base "/api" always;
        add_header Link '</.well-known/agent.json>; rel="agent-manifest", </api/openapi.json>; rel="service-desc"' always;
    }

    # SPA fallback - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-API-Base "/api" always;
        add_header Link '</.well-known/agent.json>; rel="agent-manifest", </api/openapi.json>; rel="service-desc"' always;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
